name: Bump lynkr formula

# Keeps Formula/lynkr.rb in sync with the latest `lynkr` npm release.
# Runs daily and on demand; commits directly to main when a newer version
# exists (the bump is purely mechanical: url + sha256).

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bump to (blank = npm latest dist-tag)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: bump-lynkr
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump formula
        run: |
          chmod +x ./bump.sh
          ./bump.sh "${{ github.event.inputs.version }}"

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- Formula/lynkr.rb; then
            echo "No change — formula already current."
            exit 0
          fi
          NEWV="$(grep -oE 'lynkr-[0-9][^/\"]*\.tgz' Formula/lynkr.rb \
            | sed -E 's/lynkr-(.*)\.tgz/\1/' | head -1)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/lynkr.rb
          git commit -m "lynkr ${NEWV} (automated bump)"
          git push
